<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Simple Calculator</h2>

    <label>Number 1:</label>
    <input type="number" id="num1" value="0"><br><br>
    
    <label>Number 2:</label>
    <input type="number" id="num2" value="0"><br><br>
    
    <input type="radio" name="operation" id="add" value="add" checked>
    <label for="add">Addition (+)</label><br>
    
    <input type="radio" name="operation" id="subtract" value="subtract">
    <label for="subtract">Subtraction (-)</label><br>
    
    <input type="radio" name="operation" id="multiply" value="multiply">
    <label for="multiply">Multiplication (×)</label><br>
    
    <input type="radio" name="operation" id="divide" value="divide">
    <label for="divide">Division (÷)</label><br><br>
    
    <button onclick="calculate()">Calculate</button><br><br>
    
    <label>Result:</label>
    <span id="result">0</span>

    <script src="calculator.js"></script>
</body>
</html>
